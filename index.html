<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adventurer's Guild Board</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#120d09" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Guild Board" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800&family=IM+Fell+English:ital@0;1&family=Playfair+Display:ital,wght@0,500;0,700;1,500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #120d09;
      --parchment: #ede3cb;
      --parchment-dark: #d9c9a8;
      --parchment-deep: #c9b690;
      --ink: #2c1a0e;
      --ink-light: #5c3d2a;
      --crimson: #7a0000;
      --crimson-bright: #a00000;
      --gold: #b8860b;
      --gold-light: #d4a017;
      --gold-pale: #e8c96a;
      --flow-color: #1a5c3a;
      --flow-bg: #d4edda;
      --strict-color: #7a0000;
      --strict-bg: #fde8e8;
      --panel-border: #8b6914;
      --shadow: rgba(0,0,0,0.6);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--bg);
      background-image:
        radial-gradient(ellipse at 20% 50%, #1e0f07 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, #0e0806 0%, transparent 60%),
        repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,255,255,0.01) 40px, rgba(255,255,255,0.01) 41px),
        repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,255,255,0.01) 40px, rgba(255,255,255,0.01) 41px);
      font-family: 'Playfair Display', serif;
      min-height: 100vh;
      display: flex;
      align-items: stretch;
      justify-content: stretch;
      padding: 0;
      color: var(--ink);
    }

    .app-wrapper {
      width: 100%;
      display: flex;
      gap: 0;
      align-items: stretch;
      min-height: 100vh;
    }

    /* ===== LEFT PANEL: PRIORITY PILLARS ===== */
    .priority-panel {
      width: 230px;
      flex-shrink: 0;
      background: linear-gradient(180deg, #e8dab8 0%, #dcc99a 100%);
      border-right: 1px solid var(--panel-border);
      padding: 28px 16px 28px;
      position: relative;
      display: flex;
      flex-direction: column;
      box-shadow: inset -3px 0 10px rgba(139,105,20,0.15), inset 0 0 30px rgba(139,69,19,0.1);
    }

    .priority-panel::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 28px, rgba(0,0,0,0.04) 28px, rgba(0,0,0,0.04) 29px);
      pointer-events: none;
    }

    .priority-panel-title {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold);
      text-align: center;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--parchment-deep);
      position: relative;
    }

    .priority-panel-title::after {
      content: '✦';
      display: block;
      font-size: 0.8rem;
      color: var(--gold);
      margin-top: 8px;
    }

    .priority-list { list-style: none; display: flex; flex-direction: column; gap: 0; flex: 1; }

    .priority-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 8px;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.2s;
      position: relative;
      border-bottom: 1px dashed rgba(139,105,20,0.3);
    }

    .priority-item:last-child { border-bottom: none; }

    .priority-item:hover { background: rgba(184,134,11,0.1); }

    .priority-item.active {
      background: linear-gradient(90deg, rgba(122,0,0,0.12), transparent);
      border-left: 3px solid var(--crimson);
      padding-left: 5px;
    }

    .priority-item.active .priority-name { color: var(--crimson); font-weight: 700; }

    .priority-icon {
      font-size: 1rem;
      width: 22px;
      text-align: center;
      flex-shrink: 0;
    }

    .priority-name {
      font-family: 'IM Fell English', serif;
      font-size: 0.92rem;
      color: var(--ink-light);
      flex: 1;
      transition: color 0.2s;
    }

    .priority-count {
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      background: var(--parchment-deep);
      color: var(--ink-light);
      padding: 1px 5px;
      border-radius: 10px;
      min-width: 18px;
      text-align: center;
    }

    .priority-item.active .priority-count {
      background: var(--crimson);
      color: var(--parchment);
    }

    /* Add priority row */
    .add-priority-row {
      display: flex;
      gap: 5px;
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid var(--parchment-deep);
    }

    .add-priority-input {
      flex: 1;
      padding: 6px 8px;
      font-family: 'IM Fell English', serif;
      font-size: 0.82rem;
      border: 1px solid var(--parchment-deep);
      border-radius: 2px;
      background: rgba(255,255,255,0.4);
      color: var(--ink);
      outline: none;
    }

    .add-priority-input:focus { border-color: var(--gold); background: rgba(255,255,255,0.6); }
    .add-priority-input::placeholder { color: #9e8060; font-style: italic; }

    .add-priority-btn {
      background: var(--ink);
      color: var(--gold-pale);
      border: none;
      border-radius: 2px;
      width: 28px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .add-priority-btn:hover { background: var(--gold); color: var(--ink); }

    /* ===== RIGHT PANEL: MAIN BOARD ===== */
    .main-board {
      flex: 1;
      background: linear-gradient(160deg, #ede3cb 0%, #e0d0b0 60%, #d9c9a8 100%);
      padding: 32px 40px 40px;
      position: relative;
      overflow-y: auto;
      box-shadow: inset 0 0 60px rgba(139,69,19,0.08), inset 3px 0 10px rgba(139,105,20,0.08);
    }

    /* Paper texture lines */
    .main-board::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 34px, rgba(0,0,0,0.04) 34px, rgba(0,0,0,0.04) 35px);
      pointer-events: none;
    }

    /* Content max width for readability on ultra-wide */
    .board-inner {
      max-width: 820px;
    }

    /* ===== BOARD HEADER ===== */
    .board-header {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 10px;
      position: relative;
    }

    .wax-seal {
      width: 52px;
      height: 52px;
      background: radial-gradient(circle at 35% 35%, #b00000, #600000);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cinzel', serif;
      color: var(--gold-pale);
      font-size: 1.3rem;
      font-weight: 800;
      box-shadow: inset 0 0 15px rgba(0,0,0,0.5), 2px 4px 8px rgba(0,0,0,0.4);
      border: 1px solid #400000;
      flex-shrink: 0;
      transform: rotate(-8deg);
      position: relative;
    }

    .wax-seal::after {
      content: '';
      position: absolute;
      width: 38px; height: 38px;
      border: 1px solid rgba(212,160,23,0.4);
      border-radius: 50%;
    }

    .board-title-block { flex: 1; }

    .board-category-label {
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 4px;
      color: var(--gold);
      text-transform: uppercase;
    }

    .board-title {
      font-family: 'Cinzel', serif;
      font-size: 1.6rem;
      color: var(--ink);
      font-weight: 800;
      letter-spacing: 1px;
      line-height: 1;
    }

    .board-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), var(--ink-light), var(--gold), transparent);
      margin-bottom: 18px;
      opacity: 0.5;
    }

    /* ===== STATE BADGE ===== */
    .state-toggle-row {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
      align-items: center;
    }

    .state-label {
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 2px;
      color: var(--ink-light);
      text-transform: uppercase;
      margin-right: 4px;
    }

    .state-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 12px;
      border-radius: 20px;
      font-family: 'Cinzel', serif;
      font-size: 0.62rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.2s;
      user-select: none;
    }

    .state-badge.flowing {
      background: var(--flow-bg);
      color: var(--flow-color);
      border-color: var(--flow-color);
    }

    .state-badge.strict {
      background: var(--strict-bg);
      color: var(--strict-color);
      border-color: var(--strict-color);
    }

    .state-badge.inactive {
      background: transparent;
      color: var(--ink-light);
      border-color: var(--parchment-deep);
      opacity: 0.6;
    }

    .state-badge:hover { opacity: 1; transform: scale(1.03); }

    /* ===== INPUT ROW ===== */
    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
    }

    .quest-input {
      flex: 1;
      padding: 11px 15px;
      font-family: 'IM Fell English', serif;
      font-size: 1rem;
      border: 1px solid var(--parchment-deep);
      border-radius: 2px;
      background: rgba(255,255,255,0.35);
      color: var(--ink);
      outline: none;
      box-shadow: inset 2px 2px 6px rgba(0,0,0,0.07);
      transition: all 0.2s;
    }

    .quest-input:focus {
      background: rgba(255,255,255,0.55);
      border-color: var(--gold);
    }

    .quest-input::placeholder { color: #9e8060; font-style: italic; }

    .post-btn {
      background: var(--ink);
      color: var(--gold-pale);
      font-family: 'Cinzel', serif;
      font-weight: 600;
      font-size: 0.75rem;
      letter-spacing: 2px;
      padding: 0 18px;
      border: 1px solid var(--gold);
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .post-btn:hover { background: var(--gold); color: var(--ink); }
    .post-btn:active { transform: translateY(1px); }

    /* ===== QUEST LIST ===== */
    .quest-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0;
      position: relative;
    }

    .quest-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 11px 6px;
      border-bottom: 1px solid rgba(139,105,20,0.2);
      transition: all 0.25s ease;
      animation: slideIn 0.35s ease-out;
      cursor: grab;
      position: relative;
    }

    .quest-item:last-child { border-bottom: none; }
    .quest-item:hover { background: rgba(184,134,11,0.06); border-radius: 2px; }
    .quest-item.dragging { opacity: 0.4; cursor: grabbing; }
    .quest-item.drag-over { border-top: 2px solid var(--crimson); }

    .quest-num {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      color: var(--gold);
      min-width: 18px;
      text-align: right;
      margin-top: 3px;
      flex-shrink: 0;
      user-select: none;
    }

    .drag-handle {
      color: var(--parchment-deep);
      font-size: 0.9rem;
      cursor: grab;
      line-height: 1.6;
      user-select: none;
      flex-shrink: 0;
      transition: color 0.2s;
    }

    .quest-item:hover .drag-handle { color: var(--gold); }

    .diamond-check {
      width: 18px;
      height: 18px;
      border: 2px solid var(--ink-light);
      transform: rotate(45deg);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .diamond-check:hover { border-color: var(--crimson); }

    .quest-item.done .diamond-check {
      background: var(--crimson);
      border-color: var(--crimson);
    }

    .diamond-check-inner {
      width: 7px;
      height: 7px;
      background: var(--gold-pale);
      transform: rotate(-45deg);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .quest-item.done .diamond-check-inner { opacity: 1; }

    .quest-body { flex: 1; min-width: 0; }

    .quest-text {
      font-family: 'IM Fell English', serif;
      font-size: 1rem;
      line-height: 1.4;
      color: var(--ink);
      transition: all 0.2s;
      word-break: break-word;
    }

    .quest-item.done .quest-text {
      text-decoration: line-through;
      text-decoration-color: var(--crimson);
      text-decoration-thickness: 2px;
      color: var(--ink-light);
      font-style: italic;
    }

    .quest-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
    }

    .quest-state-tag {
      font-family: 'Cinzel', serif;
      font-size: 0.52rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 1px 7px;
      border-radius: 10px;
    }

    .quest-state-tag.flowing {
      background: var(--flow-bg);
      color: var(--flow-color);
    }

    .quest-state-tag.strict {
      background: var(--strict-bg);
      color: var(--strict-color);
    }

    .quest-priority-tag {
      font-family: 'Cinzel', serif;
      font-size: 0.52rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.8;
    }

    .quest-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .quest-item:hover .quest-actions { opacity: 1; }

    .action-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      font-size: 0.85rem;
      padding: 2px 5px;
      border-radius: 2px;
      transition: all 0.15s;
      color: var(--ink-light);
    }

    .action-btn:hover { background: rgba(0,0,0,0.08); color: var(--crimson); }
    .action-btn.repeat:hover { color: var(--flow-color); }

    /* Strict order indicator */
    .strict-order-line {
      position: absolute;
      left: 32px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: linear-gradient(180deg, transparent, rgba(122,0,0,0.2), transparent);
      pointer-events: none;
    }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      text-align: center;
      padding: 30px 20px;
      border: 1px dashed var(--parchment-deep);
      border-radius: 2px;
      color: var(--ink-light);
      font-style: italic;
      font-size: 0.95rem;
    }

    .empty-state .empty-icon { font-size: 2rem; margin-bottom: 8px; }

    /* ===== MODAL for new quest ===== */
    .quest-form-state-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      align-items: center;
    }

    .form-state-pick {
      padding: 4px 12px;
      border-radius: 20px;
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 1.5px;
      cursor: pointer;
      border: 1px solid var(--parchment-deep);
      background: transparent;
      color: var(--ink-light);
      transition: all 0.2s;
    }

    .form-state-pick.selected-flowing {
      background: var(--flow-bg);
      color: var(--flow-color);
      border-color: var(--flow-color);
    }

    .form-state-pick.selected-strict {
      background: var(--strict-bg);
      color: var(--strict-color);
      border-color: var(--strict-color);
    }

    /* ===== ANIMATIONS ===== */
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-12px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .done-flash {
      animation: doneFlash 0.4s ease-out;
    }

    @keyframes doneFlash {
      0%   { background: rgba(122,0,0,0.08); }
      100% { background: transparent; }
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--parchment-dark); }
    ::-webkit-scrollbar-thumb { background: var(--parchment-deep); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--gold); }

    /* ===== STRICT ORDER NUMBER LINE ===== */
    .quest-list.strict-mode .quest-item:not(.done) .quest-num {
      color: var(--crimson);
    }

    /* ===== DELETE CONFIRMATION ===== */
    .delete-confirm {
      position: absolute;
      right: 6px;
      top: 50%;
      transform: translateY(-50%);
      background: var(--crimson);
      color: var(--parchment);
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 1px;
      padding: 3px 8px;
      border-radius: 2px;
      cursor: pointer;
      z-index: 10;
      border: none;
      display: none;
    }

    .priority-delete-btn {
      background: transparent;
      border: none;
      color: var(--parchment-deep);
      cursor: pointer;
      font-size: 0.8rem;
      padding: 0 3px;
      opacity: 0;
      transition: opacity 0.2s, color 0.2s;
    }

    .priority-item:hover .priority-delete-btn { opacity: 1; }
    .priority-delete-btn:hover { color: var(--crimson) !important; }

    /* State info tooltip */
    .state-info {
      font-family: 'IM Fell English', serif;
      font-size: 0.78rem;
      color: var(--ink-light);
      font-style: italic;
      margin-left: auto;
    }

    .repeat-indicator {
      font-size: 0.65rem;
      color: var(--flow-color);
      margin-left: 4px;
    }

    /* Flowing done shimmer */
    .quest-item.flowing-done .quest-text {
      text-decoration: none;
      color: var(--flow-color);
      font-style: italic;
    }

    .quest-item.flowing-done .diamond-check {
      background: var(--flow-color);
      border-color: var(--flow-color);
    }

    /* ===== HAMBURGER TOGGLE (hidden on desktop) ===== */
    .sidebar-toggle {
      display: none;
      position: fixed;
      bottom: 18px;
      right: 18px;
      z-index: 200;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: var(--ink);
      border: 2px solid var(--gold);
      color: var(--gold-pale);
      font-size: 1.2rem;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .sidebar-toggle:hover { background: var(--gold); color: var(--ink); }

    /* ===== RESPONSIVE: TABLET ≤ 768px ===== */
    @media (max-width: 768px) {
      .app-wrapper {
        flex-direction: column;
      }

      /* Sidebar becomes horizontal scrolling tab strip at top */
      .priority-panel {
        width: 100%;
        border-right: none;
        border-bottom: 2px solid var(--panel-border);
        padding: 10px 12px 8px;
        box-shadow: inset 0 -3px 10px rgba(139,105,20,0.15);
        flex-direction: column;
      }

      .priority-panel-title {
        font-size: 0.58rem;
        margin-bottom: 8px;
        padding-bottom: 6px;
      }
      .priority-panel-title::after { display: none; }

      /* Pill tab strip */
      .priority-list {
        flex-direction: row;
        overflow-x: auto;
        gap: 6px;
        padding-bottom: 4px;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        flex-wrap: nowrap;
      }
      .priority-list::-webkit-scrollbar { display: none; }

      .priority-item {
        flex-direction: row;
        align-items: center;
        gap: 5px;
        padding: 5px 10px;
        border-radius: 20px;
        border-bottom: none;
        border: 1px solid var(--parchment-deep);
        white-space: nowrap;
        flex-shrink: 0;
      }
      .priority-item:last-child { border-bottom: none; }
      .priority-item.active {
        border-color: var(--crimson);
        border-left-width: 1px;
        padding-left: 10px;
        background: linear-gradient(135deg, rgba(122,0,0,0.12), transparent);
      }
      .priority-item.active::before { display: none; }
      .priority-name { font-size: 0.82rem; }
      .priority-icon { font-size: 0.9rem; }
      .priority-count { font-size: 0.55rem; }

      /* Always show delete on touch */
      .priority-delete-btn { opacity: 0.6; }

      /* Add-pillar row becomes compact */
      .add-priority-row {
        margin-top: 10px;
        padding-top: 8px;
      }

      /* Main board */
      .main-board {
        padding: 20px 18px 30px;
      }

      .board-title { font-size: 1.25rem; }
      .wax-seal { width: 42px; height: 42px; font-size: 1.1rem; }

      /* State toggle wraps */
      .state-toggle-row {
        flex-wrap: wrap;
        gap: 6px;
      }
      .state-info {
        width: 100%;
        margin-left: 0;
        font-size: 0.7rem;
      }

      /* Always show quest action buttons on touch screens */
      .quest-actions { opacity: 1; }
    }

    /* ===== RESPONSIVE: MOBILE ≤ 480px ===== */
    @media (max-width: 480px) {
      /* Priority panel: hide add-pillar input row behind toggle */
      .priority-panel {
        padding: 8px 10px 6px;
      }
      .priority-panel-title { display: none; }

      .priority-item {
        padding: 4px 8px;
        gap: 4px;
      }
      .priority-name { font-size: 0.78rem; }

      .add-priority-row {
        margin-top: 6px;
        padding-top: 6px;
      }
      .add-priority-input { font-size: 0.78rem; }

      /* Main board */
      .main-board { padding: 14px 12px 24px; }

      .board-header { gap: 10px; }
      .wax-seal { width: 36px; height: 36px; font-size: 0.95rem; }
      .board-title { font-size: 1.05rem; letter-spacing: 0.5px; }
      .board-category-label { font-size: 0.52rem; letter-spacing: 2px; }

      .state-badge { font-size: 0.55rem; padding: 3px 9px; }
      .state-label { font-size: 0.55rem; }

      /* Input row stacks vertically */
      .input-row { flex-direction: column; gap: 6px; }
      .post-btn { width: 100%; padding: 10px; font-size: 0.7rem; }
      .quest-input { font-size: 0.9rem; }

      /* Quest items */
      .quest-text { font-size: 0.92rem; }
      .quest-item { padding: 10px 4px; gap: 7px; }
      .drag-handle { font-size: 0.8rem; }
      .quest-num { font-size: 0.6rem; min-width: 14px; }

      /* Meta tags smaller */
      .quest-state-tag { font-size: 0.48rem; letter-spacing: 1px; padding: 1px 5px; }
      .quest-priority-tag { font-size: 0.48rem; }
    }
  </style>
</head>
<body>
<div class="app-wrapper">

  <!-- ===== LEFT: PRIORITY PILLAR ===== -->
  <div class="priority-panel" id="priority-panel">
    <div class="priority-panel-title">Life Pillars</div>
    <ul class="priority-list" id="priority-list"></ul>
    <div class="add-priority-row">
      <input class="add-priority-input" id="priority-input" type="text" placeholder="New pillar…" maxlength="24" />
      <button class="add-priority-btn" id="add-priority-btn" title="Add pillar">+</button>
    </div>
  </div>

  <!-- ===== RIGHT: MAIN BOARD ===== -->
  <div class="main-board">
    <div class="board-inner">
    <div class="board-header">
      <div class="wax-seal" id="seal-letter">M</div>
      <div class="board-title-block">
        <div class="board-category-label" id="board-category-label">All Pillars</div>
        <div class="board-title" id="board-title">Guild Commissions</div>
      </div>
    </div>
    <div class="board-divider"></div>

    <!-- State selector + info -->
    <div class="state-toggle-row">
      <span class="state-label">Mode:</span>
      <span class="state-badge flowing" id="btn-flowing" title="Flowing: can be done many times a day" onclick="setActiveState('flowing')">⟳ Flowing</span>
      <span class="state-badge inactive" id="btn-strict" title="Strict: must be done in order" onclick="setActiveState('strict')">⚑ Strict</span>
      <span class="state-info" id="state-info-text">Repeatable tasks</span>
    </div>

    <!-- Input -->
    <div class="input-row">
      <input class="quest-input" id="quest-input" type="text" placeholder="Draft a new commission…" />
      <button class="post-btn" id="post-btn">POST</button>
    </div>

    <!-- List -->
    <ul class="quest-list" id="quest-list"></ul>
    </div><!-- /board-inner -->
  </div>

</div>

<script>
// =========================================================
//  STATE & DATA
// =========================================================
const ICONS = ['🕯️','⚔️','📜','🧿','💧','🌙','🔮','🏔️','🌿','🎯','📚','✨'];
const DEFAULT_PRIORITIES = [
  { id: 'p1', name: 'Meditating', icon: '🧘', color: '#2d5a27' },
  { id: 'p2', name: 'Studying',   icon: '📚', color: '#1a3a7a' },
  { id: 'p3', name: 'Life',       icon: '🌿', color: '#4a2d0e' },
  { id: 'p4', name: 'Virtual Life',icon: '🔮', color: '#4a0e4a' },
];

let priorities  = JSON.parse(localStorage.getItem('guild_priorities')) || DEFAULT_PRIORITIES;
let quests      = JSON.parse(localStorage.getItem('guild_quests'))     || defaultQuests();
let activeP     = 'all';     // selected priority id
let activeState = 'flowing'; // 'flowing' | 'strict'
let dragSrc     = null;

function defaultQuests() {
  return [
    { id: q(), text:'Morning breathing ritual', priority:'p1', state:'flowing', done:false, doneCount:0 },
    { id: q(), text:'Read 10 pages',            priority:'p2', state:'flowing', done:false, doneCount:0 },
    { id: q(), text:'Drink 8 glasses of water', priority:'p3', state:'flowing', done:false, doneCount:0 },
    { id: q(), text:'Journal entry',            priority:'p3', state:'strict',  done:false, doneCount:0 },
    { id: q(), text:'Check guild messages',     priority:'p4', state:'strict',  done:false, doneCount:0 },
  ];
}

function q() { return 'q' + Date.now() + Math.random().toString(36).slice(2,6); }

function save() {
  localStorage.setItem('guild_priorities', JSON.stringify(priorities));
  localStorage.setItem('guild_quests',     JSON.stringify(quests));
}

// =========================================================
//  RENDER PRIORITIES
// =========================================================
function countFor(pid) {
  return quests.filter(q => (pid==='all' || q.priority===pid) && !q.done).length;
}

function renderPriorities() {
  const ul = document.getElementById('priority-list');
  ul.innerHTML = '';

  // "All" option
  const allLi = makePLi('all', '⚜️', 'All Commissions', countFor('all'));
  ul.appendChild(allLi);

  priorities.forEach(p => {
    ul.appendChild(makePLi(p.id, p.icon, p.name, countFor(p.id), true));
  });

  // Update board header
  updateBoardHeader();
}

function makePLi(id, icon, name, count, deletable=false) {
  const li = document.createElement('li');
  li.className = 'priority-item' + (activeP === id ? ' active' : '');
  li.dataset.id = id;
  li.innerHTML = `
    <span class="priority-icon">${icon}</span>
    <span class="priority-name">${name}</span>
    <span class="priority-count">${count}</span>
    ${deletable ? `<button class="priority-delete-btn" title="Remove pillar" data-pid="${id}">✕</button>` : ''}
  `;
  li.addEventListener('click', (e) => {
    if (e.target.closest('.priority-delete-btn')) return;
    activeP = id;
    renderAll();
  });
  if (deletable) {
    li.querySelector('.priority-delete-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      deletePriority(id);
    });
  }
  return li;
}

function deletePriority(id) {
  if (!confirm('Remove this pillar and all its commissions?')) return;
  priorities = priorities.filter(p => p.id !== id);
  quests = quests.filter(q => q.priority !== id);
  if (activeP === id) activeP = 'all';
  save();
  renderAll();
}

function updateBoardHeader() {
  const seal   = document.getElementById('seal-letter');
  const label  = document.getElementById('board-category-label');
  const title  = document.getElementById('board-title');

  if (activeP === 'all') {
    seal.textContent = '⚜';
    label.textContent = 'All Pillars';
    title.textContent = 'Guild Commissions';
  } else {
    const p = priorities.find(x => x.id === activeP);
    if (p) {
      seal.textContent = p.icon;
      label.textContent = 'Pillar';
      title.textContent = p.name;
    }
  }
}

// =========================================================
//  STATE BADGE
// =========================================================
function setActiveState(s) {
  activeState = s;
  const fb = document.getElementById('btn-flowing');
  const sb = document.getElementById('btn-strict');
  const info = document.getElementById('state-info-text');

  if (s === 'flowing') {
    fb.className = 'state-badge flowing';
    sb.className = 'state-badge inactive';
    info.textContent = 'Repeatable tasks';
  } else {
    fb.className = 'state-badge inactive';
    sb.className = 'state-badge strict';
    info.textContent = 'Must be done in order';
  }
}

// =========================================================
//  RENDER QUESTS
// =========================================================
function visibleQuests() {
  return quests.filter(q => activeP === 'all' || q.priority === activeP);
}

function renderQuests() {
  const ul = document.getElementById('quest-list');
  ul.innerHTML = '';

  const list = visibleQuests();

  if (list.length === 0) {
    ul.innerHTML = `
      <li class="empty-state">
        <div class="empty-icon">🪶</div>
        No commissions posted. Rest at the tavern.
      </li>`;
    return;
  }

  // Group by state if showing all
  const byState = { strict: list.filter(q=>q.state==='strict'), flowing: list.filter(q=>q.state==='flowing') };
  const order = ['strict','flowing'];

  order.forEach(state => {
    const group = byState[state];
    if (!group.length) return;

    // Group header
    const header = document.createElement('li');
    header.style.cssText = `
      padding: 8px 6px 4px;
      font-family: Cinzel, serif;
      font-size: 0.58rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: ${state==='strict' ? 'var(--crimson)' : 'var(--flow-color)'};
      border-bottom: 1px solid ${state==='strict' ? 'rgba(122,0,0,0.2)' : 'rgba(26,92,58,0.2)'};
      margin-bottom: 2px;
      margin-top: ${state==='strict'?'0':'10px'};
      display: flex;
      align-items: center;
      gap: 6px;
    `;
    header.innerHTML = `
      <span>${state==='strict' ? '⚑' : '⟳'}</span>
      <span>${state==='strict' ? 'Strict Order' : 'Flowing'}</span>
      <span style="margin-left:auto; font-size:0.5rem; opacity:0.7">${state==='strict'?'do in sequence':'repeatable'}</span>
    `;
    ul.appendChild(header);

    group.forEach((quest, idx) => {
      const li = document.createElement('li');
      const isDone = quest.done;
      const isFlowingDone = isDone && quest.state === 'flowing';
      li.className = `quest-item${isDone ? (isFlowingDone ? ' done flowing-done' : ' done') : ''}`;
      li.dataset.id = quest.id;
      li.draggable = true;

      const pName = (activeP === 'all')
        ? (priorities.find(p=>p.id===quest.priority)?.name || '')
        : '';

      const repeatBadge = quest.doneCount > 0
        ? `<span class="repeat-indicator">✕${quest.doneCount}</span>`
        : '';

      li.innerHTML = `
        <span class="quest-num">${idx + 1}.</span>
        <span class="drag-handle" title="Drag to reorder">⠿</span>
        <div class="diamond-check" title="Toggle done">
          <div class="diamond-check-inner"></div>
        </div>
        <div class="quest-body">
          <div class="quest-text">${escapeHtml(quest.text)}</div>
          <div class="quest-meta">
            <span class="quest-state-tag ${quest.state}">${quest.state==='flowing'?'⟳ Flowing':'⚑ Strict'}</span>
            ${pName ? `<span class="quest-priority-tag">· ${pName}</span>` : ''}
            ${repeatBadge}
          </div>
        </div>
        <div class="quest-actions">
          <button class="action-btn repeat" title="Log another completion (flowing)" data-id="${quest.id}">⟳</button>
          <button class="action-btn" title="Delete commission" data-id="${quest.id}" data-action="delete">✕</button>
        </div>
      `;

      // Toggle done
      li.querySelector('.diamond-check').addEventListener('click', () => toggleDone(quest.id, li));

      // Repeat (flowing count up)
      li.querySelector('.action-btn.repeat').addEventListener('click', (e) => {
        e.stopPropagation();
        repeatQuest(quest.id);
      });

      // Delete
      li.querySelector('[data-action="delete"]').addEventListener('click', (e) => {
        e.stopPropagation();
        deleteQuest(quest.id);
      });

      // Drag
      li.addEventListener('dragstart', onDragStart);
      li.addEventListener('dragover',  onDragOver);
      li.addEventListener('drop',      onDrop);
      li.addEventListener('dragend',   onDragEnd);

      ul.appendChild(li);
    });
  });
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// =========================================================
//  QUEST ACTIONS
// =========================================================
function addQuest() {
  const input = document.getElementById('quest-input');
  const text = input.value.trim();
  if (!text) return;

  const pid = activeP === 'all' ? (priorities[0]?.id || 'p1') : activeP;

  quests.push({ id: q(), text, priority: pid, state: activeState, done: false, doneCount: 0 });
  input.value = '';
  save();
  renderAll();
}

function toggleDone(id, li) {
  const quest = quests.find(q => q.id === id);
  if (!quest) return;

  if (quest.state === 'flowing' && quest.done) {
    // Reset for flowing
    quest.done = false;
  } else {
    quest.done = !quest.done;
    if (quest.done && quest.state === 'flowing') {
      quest.doneCount = (quest.doneCount || 0) + 1;
    }
  }

  li.classList.add('done-flash');
  setTimeout(() => li.classList.remove('done-flash'), 400);

  save();
  renderAll();
}

function repeatQuest(id) {
  const quest = quests.find(q => q.id === id);
  if (!quest) return;
  quest.doneCount = (quest.doneCount || 0) + 1;
  quest.done = false; // Reset to allow redo
  save();
  renderAll();
}

function deleteQuest(id) {
  quests = quests.filter(q => q.id !== id);
  save();
  renderAll();
}

// =========================================================
//  DRAG & DROP
// =========================================================
function onDragStart(e) {
  dragSrc = this;
  this.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}

function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.quest-item').forEach(li => li.classList.remove('drag-over'));
  this.classList.add('drag-over');
}

function onDrop(e) {
  e.preventDefault();
  if (dragSrc === this) return;

  const srcId  = dragSrc.dataset.id;
  const dstId  = this.dataset.id;
  const srcIdx = quests.findIndex(q => q.id === srcId);
  const dstIdx = quests.findIndex(q => q.id === dstId);
  if (srcIdx < 0 || dstIdx < 0) return;

  const [moved] = quests.splice(srcIdx, 1);
  quests.splice(dstIdx, 0, moved);

  save();
  renderAll();
}

function onDragEnd() {
  document.querySelectorAll('.quest-item').forEach(li => {
    li.classList.remove('dragging', 'drag-over');
  });
}

// =========================================================
//  ADD PRIORITY
// =========================================================
function addPriority() {
  const input = document.getElementById('priority-input');
  const name = input.value.trim();
  if (!name) return;

  const id   = 'p' + Date.now();
  const icon = ICONS[Math.floor(Math.random() * ICONS.length)];
  priorities.push({ id, name, icon });
  input.value = '';
  save();
  renderAll();
}

// =========================================================
//  RENDER ALL
// =========================================================
function renderAll() {
  renderPriorities();
  renderQuests();
}

// =========================================================
//  EVENTS
// =========================================================
document.getElementById('post-btn').addEventListener('click', addQuest);
document.getElementById('quest-input').addEventListener('keypress', e => {
  if (e.key === 'Enter') addQuest();
});
document.getElementById('add-priority-btn').addEventListener('click', addPriority);
document.getElementById('priority-input').addEventListener('keypress', e => {
  if (e.key === 'Enter') addPriority();
});

// =========================================================
//  BOOT
// =========================================================
setActiveState('flowing');
renderAll();

// =========================================================
//  SERVICE WORKER REGISTRATION (PWA)
// =========================================================
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js')
      .then(reg => console.log('[SW] Registered:', reg.scope))
      .catch(err => console.warn('[SW] Registration failed:', err));
  });
}
</script>
</body>
</html>
